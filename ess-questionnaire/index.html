mit-band p{margin:0;color:var(--muted)}.primary-btn,.secondary-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:6px;border:1px solid transparent;min-height:42px;padding:10px 14px;cursor:pointer;font-weight:700;text-decoration:none}.primary-btn{background:var(--green);color:#fff}.secondary-btn{background:#fff;color:var(--green);border-color:var(--line)}.primary-btn:hover,.secondary-btn:hover{filter:brightness(.97)}.invalid{border-color:var(--danger);background:#fff7f6}@media(max-width:980px){.app-header{grid-template-columns:48px minmax(0,1fr)}.brand-mark{width:48px;height:48px}.status-pill{grid-column:1/-1;justify-self:start}.layout{grid-template-columns:1fr}.progress-panel{position:static}.field-grid,.submit-band{grid-template-columns:1fr}}@media(max-width:560px){h1{font-size:20px}.field-row{grid-template-columns:1fr}}

<body>
<header class="app-header"><div class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></div><div><p class="company">進金生能源服務股份有限公司</p><h1>進能服 6692 工商儲能案場初始配置問卷</h1></div><div class="status-pill" id="receiverStatus">讀取設定中</div></header>
<main class="layout"><aside class="progress-panel" aria-label="填寫進度"><div class="progress-title">填寫進度</div><div class="progress-meter" aria-hidden="true"><span id="progressBar"></span></div><div id="progressText" class="progress-text">0% 完成</div><nav id="sectionNav" class="section-nav"></nav><div class="toolbox"><button type="button" id="saveDraftBtn" class="secondary-btn">□ 暫存</button><button type="button" id="loadDraftBtn" class="secondary-btn">↺ 載入暫存</button><button type="button" id="exportCsvBtn" class="secondary-btn">↓ 匯出 CSV</button><button type="button" id="exportJsonBtn" class="secondary-btn">↓ 匯出 JSON</button></div></aside><section class="form-shell"><div class="notice" id="receiverNotice"></div><form id="questionnaireForm" novalidate><div id="formSections"></div><section class="submit-band"><div><h2>送出問卷</h2><p>送出前請確認必填欄位與聯絡資料。附件檔案請依業務指定方式另行提供。</p></div><button type="submit" class="primary-btn">✓ 送出資料</button></section></form><output id="resultBox" class="result-box" aria-live="polite"></output></section></main>
<script>
const FORM_RECEIVER={endpoint:"",recipientLabel:"尚未設定接收帳號",method:"POST"};
const FORM_SCHEMA=[{id:"basic",title:"專案基本資料",description:"建立客戶、案場與主要聯絡窗口資料。",fields:[["B-01","customer_company","客戶公司名稱","text",true,"請填寫申請或業主公司全名。"],["B-02","tax_id","統一編號","text",false,"如尚未成立專案公司，請填母公司統編。"],["B-03","project_name","案場名稱","text",true,"建議使用縣市 + 用戶/園區 + 儲能案名稱。"],["B-04","site_address","案場地址","textarea",true,"請填寫完整地址或地號。"],["B-05","contact_name","主要聯絡人","text",true,"姓名與職稱。"],["B-06","phone","聯絡電話","tel",true,"行動電話或公司分機。"],["B-07","email","電子郵件","email",true,"後續需求確認與文件往來使用。"],["B-08","project_role","專案角色","select",true,"業主/用電戶/地主/EPC/顧問/其他",["業主","用電戶","地主","EPC","顧問","其他"]],["B-09","cod_target","預計商轉時間","text",true,"請填西元年月，若未定請填目標季度。"],["B-10","project_stage","專案目前階段","select",true,"初評/報價/設計/送審/施工/既有案場改造",["初評","報價","設計","送審","施工","既有案場改造"]]]},{id:"site",title:"場址與用電資料",description:"判斷案場可建置性、用電型態與需量管理機會。",fields:[["S-01","ownership","土地/建物權屬","select",true,"自有、租賃、共同持有或其他。",["自有","租賃","共同持有","其他"]],["S-02","install_space","可用設置空間","select",true,"室內、室外、屋頂、貨櫃區或其他。",["室內","室外","屋頂","貨櫃區","其他"]],["S-03","available_area","可用面積","number",true,"請填可實際配置儲能設備的面積，單位：平方公尺。"],["S-04","site_limits","場址環境限制","textarea",false,"噪音、防火、淹水、鄰地距離、動線、吊裝限制等。"],["S-05","contract_capacity","契約容量 kW","number",true,"請依電費單或台電契約填寫。"],["S-06","max_demand","最高需量 kW","number",true,"近 12 個月最高需量，若有尖峰/離峰請補充。"],["S-07","monthly_usage","月用電量 kWh/月","number",true,"近 12 個月平均或最新月份用電量。"],["S-08","load_profile","用電型態","textarea",true,"日間、夜間、連續製程、季節性、間歇性等。"],["S-09","existing_generation","既有發電設備","select",true,"太陽光電、發電機、UPS、其他。",["無","太陽光電","發電機","UPS","其他"]],["S-10","power_docs","單線圖/電費單","select",true,"是否可提供最近 12 個月電費單與單線圖。",["可提供","稍後提供","無"]]]},{id:"ess",title:"儲能系統需求",description:"初步規格化 PCS、電池容量、控制策略與系統邊界。",fields:[["E-01","use_case","應用情境","select",true,"需量反應、削峰填谷、備援、光儲整合、輔助服務、微電網。",["需量反應","削峰填谷","備援","光儲整合","輔助服務","微電網","其他"]],["E-02","target_power","目標功率 kW/MW","text",true,"預期放電功率。"],["E-03","target_capacity","目標容量 kWh/MWh","text",true,"預期可用電量。"],["E-04","duration_hours","放電時長","number",true,"例如 1 小時、2 小時、4 小時。"],["E-05","daily_cycles","每日循環次數","number",true,"預估每天完整充放電次數。"],["E-06","backup_loads","備援負載","textarea",false,"若需備援，請列出重要負載與容量。"],["E-07","interconnection_mode","併網模式","select",true,"表後、表前、獨立併網、與 PV/用戶共接。",["表後","表前","獨立併網","PV 共接","其他"]],["E-08","ems_requirements","通訊與 EMS 需求","textarea",false,"Modbus、IEC 61850、API、SCADA、雲端監控等。"],["E-09","safety_requirements","消防與安全要求","textarea",true,"地方消防、保險、業主內規、第三方驗證等。"],["E-10","equipment_limits","偏好設備或限制","textarea",false,"品牌、電芯化學、貨櫃尺寸、保固、在地服務等。"]]},{id:"grid",title:"併網與法規資料",description:"判斷台電申請、保護協調、消防與地方主管機關需求。",fields:[["G-01","voltage_level","供電電壓","select",true,"低壓、高壓、特高壓或其他。",["低壓","高壓","特高壓","其他"]],["G-02","service_point","受電點資訊","textarea",true,"台電電號、饋線、變壓器容量等。"],["G-03","protection_devices","既有保護設備","textarea",false,"斷路器、保護電驛、ATS、接地系統等。"],["G-04","grid_application_status","併網申請狀態","select",true,"未啟動、資料準備中、已送件、補件中、已核准。",["未啟動","準備中","已送件","補件中","已核准"]],["G-05","fire_review_status","消防審查狀態","select",true,"未啟動、資料準備中、已送件、補件中、已核准。",["未啟動","準備中","已送件","補件中","已核准"]],["G-06","building_limits","建照/使照限制","textarea",false,"是否涉及建築、結構、土地使用或管委會限制。"],["G-07","environment_limits","環境/噪音限制","textarea",false,"地方環保或業主內規要求。"],["G-08","cybersecurity","資安與資料要求","textarea",false,"資料保存、權限、遠端連線、內網隔離等。"]]},{id:"commercial",title:"商務與時程",description:"判斷報價邊界、責任分工、付款方式與預期採購流程。",fields:[["C-01","purchase_model","採購模式","select",true,"EPC、設備採購、租賃、PPA/共享收益、維運合約。",["EPC","設備採購","租賃","PPA","共享收益","維運合約"]],["C-02","budget","預算範圍","text",false,"若不便填寫，可填待評估。"],["C-03","quote_scope","報價範圍","textarea",true,"是否包含設計、設備、施工、消防、併網、維運。"],["C-04","om_requirements","維運需求","textarea",true,"保固年限、定期巡檢、24/7 監控、備品、SLA。"],["C-05","decision_process","決策流程","textarea",false,"評選、議價、簽約、董事會或標案流程。"],["C-06","milestones","關鍵時程","textarea",true,"現勘、提案、報價、送審、施工、商轉目標。"],["C-07","competitors","競品或既有方案","textarea",false,"若已有其他報價或設備規格，可概述。"],["C-08","other_notes","其他補充","textarea",false,"客戶希望進能服 6692 特別評估的事項。"]]},{id:"attachments",title:"附件清單",description:"請勾選可提供資料，檔案可另由業務指定管道收取。",fields:[["A-01","bill_12m","近 12 個月電費單","select",false,"用於用電型態與需量評估。",["已提供","待提供","無"]],["A-02","single_line","單線圖","select",false,"用於併接點與保護協調初評。",["已提供","待提供","無"]],["A-03","layout_plan","場址平面圖","select",false,"用於設備配置、動線與消防距離評估。",["已提供","待提供","無"]],["A-04","site_photos","現場照片","select",false,"含設置區、受電室、配電盤、進出動線。",["已提供","待提供","無"]],["A-05","pv_info","PV 系統資料","select",false,"若有光電，請提供容量、逆變器、併接方式。",["已提供","待提供","不適用"]],["A-06","requirements_docs","既有契約/規範","select",false,"業主內規、消防要求、保險要求或標案規範。",["已提供","待提供","無"]]]}];
const form=document.querySelector("#questionnaireForm"),formSections=document.querySelector("#formSections"),sectionNav=document.querySelector("#sectionNav"),progressBar=document.querySelector("#progressBar"),progressText=document.querySelector("#progressText"),receiverStatus=document.querySelector("#receiverStatus"),receiverNotice=document.querySelector("#receiverNotice"),resultBox=document.querySelector("#resultBox"),storageKey="jnfs-6692-ess-questionnaire-draft";function escapeHtml(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}function normalizeName(label){return label.replace(/\s+/g,"")}function renderField(field){const[code,name,label,type,required,hint,options=[]]=field,requiredText=required?'<span class="required">*</span>':"",id=`field_${name}`;let control="";if(type==="textarea")control=`<textarea id="${id}" name="${name}" ${required?"required":""}></textarea>`;else if(type==="select")control=`<select id="${id}" name="${name}" ${required?"required":""}><option value="">請選擇</option>${options.map(o=>`<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join("")}</select>`;else control=`<input id="${id}" name="${name}" type="${type}" ${required?"required":""} />`;return `<div class="field-row"><div class="field-code">${escapeHtml(code)}</div><div><label for="${id}">${escapeHtml(label)}${requiredText}</label>${control}<p class="hint">${escapeHtml(hint)}</p></div></div>`}function renderForm(){formSections.innerHTML=FORM_SCHEMA.map(section=>`<section class="form-section" id="${section.id}"><div class="section-heading"><div><h2>${escapeHtml(section.title)}</h2><p>${escapeHtml(section.description)}</p></div><div class="section-count">${section.fields.filter(f=>f[4]).length} 個必填</div></div><div class="field-grid">${section.fields.map(renderField).join("")}</div></section>`).join("");sectionNav.innerHTML=FORM_SCHEMA.map(s=>`<a href="#${s.id}">${escapeHtml(s.title)}</a>`).join("")}function collectData(){const formData=new FormData(form),values={};for(const section of FORM_SCHEMA)for(const field of section.fields){const[,name,label]=field;values[name]={label,value:formData.get(name)||""}}values.submitted_at={label:"送出時間",value:new Date().toISOString()};values.form_version={label:"表單版本",value:"進能服 6692 中文版 v1.0"};return values}function flattenData(values){const row={};for(const item of Object.values(values))row[normalizeName(item.label)]=item.value;return row}function toCsv(values){const row=flattenData(values),headers=Object.keys(row),esc=v=>`"${String(v??"").replaceAll('"','""')}"`;return `${headers.map(esc).join(",")}\n${headers.map(h=>esc(row[h])).join(",")}\n`}function downloadText(filename,content,type){const blob=new Blob([content],{type}),url=URL.createObjectURL(blob),link=document.createElement("a");link.href=url;link.download=filename;document.body.append(link);link.click();link.remove();URL.revokeObjectURL(url)}function updateProgress(){const required=[...form.querySelectorAll("[required]")],filled=required.filter(e=>e.value.trim()).length,ratio=required.length?Math.round(filled/required.length*100):0;progressBar.style.width=`${ratio}%`;progressText.textContent=`${ratio}% 完成`}function markInvalidFields(){let first=null;for(const el of form.querySelectorAll("[required]")){const invalid=!el.value.trim();el.classList.toggle("invalid",invalid);if(invalid&&!first)first=el}if(first)first.focus();return !first}function saveDraft(){localStorage.setItem(storageKey,JSON.stringify(collectData()));resultBox.textContent="已暫存到此瀏覽器。"}function loadDraft(){const raw=localStorage.getItem(storageKey);if(!raw){resultBox.textContent="沒有找到暫存資料。";return}const values=JSON.parse(raw);for(const[name,item]of Object.entries(values)){const el=form.elements[name];if(el&&typeof item.value==="string")el.value=item.value}updateProgress();resultBox.textContent="已載入暫存資料。"}async function submitData(values){if(!FORM_RECEIVER.endpoint){resultBox.textContent="尚未設定接收端點，資料未送出。請先匯出 CSV/JSON，或設定接收端點。";return}const response=await fetch(FORM_RECEIVER.endpoint,{method:FORM_RECEIVER.method||"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({source:"jnfs-6692-ess-questionnaire",data:flattenData(values),raw:values})});if(!response.ok)throw new Error(`送出失敗，HTTP ${response.status}`);localStorage.removeItem(storageKey);resultBox.textContent="資料已送出。進能服業務將依表單內容進行後續評估。";form.reset();updateProgress()}function setupReceiverStatus(){if(FORM_RECEIVER.endpoint){receiverStatus.textContent=`資料送至：${FORM_RECEIVER.recipientLabel||"已設定端點"}`;receiverNotice.textContent="此表單送出後會傳送到已設定的接收端點。"}else{receiverStatus.textContent="尚未設定接收端點";receiverStatus.classList.add("offline");receiverNotice.textContent="目前尚未設定資料接收端點。業務仍可讓客戶填寫並匯出 CSV/JSON；正式發布前請接上 Google Apps Script、Formspree 或其他表單接收服務。";receiverNotice.classList.add("warning")}}renderForm();setupReceiverStatus();updateProgress();form.addEventListener("input",updateProgress);form.addEventListener("change",updateProgress);document.querySelector("#saveDraftBtn").addEventListener("click",saveDraft);document.querySelector("#loadDraftBtn").addEventListener("click",loadDraft);document.querySelector("#exportCsvBtn").addEventListener("click",()=>downloadText("進能服6692_儲能問卷填寫資料.csv",`\ufeff${toCsv(collectData())}`,"text/csv;charset=utf-8"));document.querySelector("#exportJsonBtn").addEventListener("click",()=>downloadText("進能服6692_儲能問卷填寫資料.json",JSON.stringify(collectData(),null,2),"application/json;charset=utf-8"));form.addEventListener("submit",async e=>{e.preventDefault();resultBox.textContent="";if(!markInvalidFields()){resultBox.textContent="請先完成所有必填欄位。";return}try{await submitData(collectData())}catch(error){resultBox.textContent=error.message}});
</script>
